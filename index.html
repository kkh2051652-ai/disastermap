<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>재난안전문자 지도</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://tile.openstreetmap.org" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQrzsl4D/LcP3pgGy1Pw4rNnGZ1T6+M="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"><i data-lucide="shield-check"></i></span>
          <h1>재난안전문자 지도</h1>
        </div>
        <div class="topbar-actions">
          <div class="update-meta">
            <span>실시간 업데이트</span>
            <strong id="updatedAt">-</strong>
          </div>
          <button class="icon-button" id="refreshBtn" type="button" title="새로고침" aria-label="새로고침">
            <i data-lucide="refresh-cw"></i>
          </button>
        </div>
      </header>

      <main class="dashboard">
        <aside class="left-panel panel-surface" aria-label="조회 및 필터">
          <section class="panel-section">
            <div class="section-heading">
              <h2>기간 조회</h2>
              <button class="ghost-icon" id="resetBtn" type="button" title="초기화" aria-label="초기화">
                <i data-lucide="rotate-ccw"></i>
              </button>
            </div>

            <p class="section-note">
              <i data-lucide="info"></i>
              최근 한 달 이내 데이터만 조회할 수 있습니다.
            </p>

            <div class="quick-range" role="group" aria-label="빠른 기간 선택">
              <button class="range-button is-active" data-days="0" type="button">오늘</button>
              <button class="range-button" data-preset="yesterday" type="button">어제</button>
              <button class="range-button" data-preset="this-month" type="button">이번달</button>
              <button class="range-button" data-days="3" type="button">3일</button>
              <button class="range-button" data-days="7" type="button">7일</button>
            </div>

            <div class="date-range-fields">
              <label class="date-field" for="startDateInput">
                <span>시작일</span>
                <input id="startDateInput" type="date" />
              </label>
              <label class="date-field" for="endDateInput">
                <span>종료일</span>
                <input id="endDateInput" type="date" />
              </label>
            </div>
            <button class="query-button" id="queryBtn" type="button">
              <i data-lucide="search"></i>
              조회
            </button>
          </section>

          <section class="panel-section">
            <div class="section-heading">
              <h2>재해구분 필터</h2>
              <button class="link-button" id="selectAllTypes" type="button">전체 선택</button>
            </div>
            <div class="type-grid" id="typeFilter" aria-label="재해구분"></div>
          </section>

          <section class="panel-section summary-card" aria-label="요약 통계">
            <div class="section-heading">
              <h2>요약 통계</h2>
              <span id="summaryPeriod">선택 기간</span>
            </div>
            <div class="total-count">
              <strong id="totalCount">-</strong>
              <span>건</span>
            </div>
            <p id="summaryRegion">전국 재난문자</p>
            <ul class="summary-list" id="summaryList"></ul>
          </section>
        </aside>

        <section class="map-stage" aria-label="재난문자 지도">
          <div class="map-search">
            <i data-lucide="search"></i>
            <input id="regionSearch" type="search" placeholder="지역명 검색 (예: 인천 서구)" autocomplete="off" />
          </div>
          <div id="map" class="map-canvas" role="application" aria-label="지도"></div>
          <div class="map-legend" aria-label="재해구분 범례" id="mapLegend"></div>
          <div class="status-toast" id="statusToast" role="status" aria-live="polite"></div>
        </section>

        <aside class="right-panel panel-surface" aria-label="재난문자 목록 및 상세">
          <section class="panel-section list-section">
            <div class="section-heading">
              <div class="section-title">
                <h2 id="listTitle">재난문자 목록</h2>
                <button class="link-button list-filter-clear" id="clearRegionFilter" type="button" hidden>전체 보기</button>
              </div>
              <select id="sortSelect" aria-label="정렬 방식">
                <option value="latest">최신순</option>
                <option value="severity">단계순</option>
                <option value="region">지역순</option>
              </select>
            </div>
            <div class="message-list" id="messageList"></div>
            <button class="load-more" id="loadMoreBtn" type="button">더보기</button>
          </section>

          <section class="panel-section detail-section" aria-label="상세 정보">
            <div class="section-heading">
              <h2>상세 정보</h2>
              <button class="ghost-icon" id="closeDetailBtn" type="button" title="상세 닫기" aria-label="상세 닫기">
                <i data-lucide="x"></i>
              </button>
            </div>
            <div class="detail-content" id="detailContent"></div>
          </section>
        </aside>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
